晚风裹着胡同烟火，轻叩生日专场的门扉，
音符串起独属于我们的心动奇遇。

1.17-18，在北京，
以歌声为契，
在这场名为“Lee’s music party”的派对中，
烛火摇曳映着笑颜，掌心的愿望闪着星光，
沉浸在李权哲的治愈宇宙。

当来日记忆随晚风漫溯，星光为诗，
烛火为引，镌刻专属于李权哲的京城星辰印记。
那些定格的心动瞬间，
是我们共同心愿与旋律交织的轨迹。

北京的生日派对整装待发，
载着满心期许，等你共赴这场生日之约。`,analyticalConcept:"精选长街初落雪、冬晚轻寒等极致感官画面，将生日会包装成一场粉丝与艺人在冬夜『围炉听琴』的温暖隐喻。全篇不使用高亢的广告修辞，转而以『碎银』、『胡同烟火』这些温润平实的落笔，牢牢兜住极具穿透力的归属感。",designSynchro:"上半部分是冷色系的初雪雪景与仰望星空的少年剪影，下半部分承接如同白纸般莹澈无垢的异形背景图。文字采用深青色居中排布，配以圆融的手写花体，不仅完全融于画面，更实现『见字如见雪、读词即闻歌』的极高通感境界。",originalFileName:"李权哲生日派对北京站海报原图"},"huchunyang-text":{id:"huchunyang-text",title:"胡春杨『世界多大，我陪你吧』杭州生日会主海报",subtitle:"用陪伴跨越山海，肆意挥洒大片暖橙的执手相伴感悟",artist:"胡春杨",vibeTag:"温柔缱绻 • 坚定守护 • 青春肆意",slogan:"“这分陪伴跨越山海，成为往后岁月里彼此底气的证明”",locationInfo:{venue:"UP青年向上展演中心",address:"杭州市西湖区蒋墩路375号华策中心A座 UP青年向上展演中心",hosts:"主办：纾星文化 | 经纪公司：乐华娱乐"},vibeStyles:["深沉羁绊渲染：反复咬合『偏爱』与『感恩』的双轴心意","山海空间跃动：文字具有阔大的行文动向，配合泼墨的狂放","行动号召治愈：以『酿成岁岁年年』收束，完成情绪的温暖蒸馏"],copyContent:`欢迎来到胡春杨
「世界多大，我陪你吧」杭州生日会！

在这里，没有遥远的距离，只有彼此相伴的笃定。
你带着经年的偏爱而来，他揣着满心的感恩赴约，
在灯光璀璨的舞台上，共度一段被爱与欢笑填满的时光。

他会用最真挚的旋律诉说心意，让这份陪伴跨越山海，
成为往后岁月里彼此底气的证明。

「世界多大，我陪你吧」杭州生日会的帷幕即将拉开，
带着满心期待赴约，和胡春杨一起，
